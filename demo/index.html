<!DOCTYPE html>

<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">

    <title>Demo</title>

    <meta charset="utf-8">
    <meta name="description" content="A demo page.">
    <meta name="author" content="Brooke Kuhlmann">

    <link rel="icon" href="https://alchemists.io/favicon.ico" sizes="32x32">
    <link href="/stylesheet.css" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">

    <script src="https://unpkg.com/htmx.org@2.0"></script>
    <script src="/htmx-slide.js" defer></script>
  </head>

  <body class="page">
    <header class="header">
      <h1 class="label">htmx Slide</h1>
      <h2 class="label">Demonstration</h2>
    </header>

    <main class="body">
      <section class="htmx-slide"
               hx-ext="slide"
               hx-select-oob="#slide, #progress, #actions"
               hx-swap="transition:true">

         <div class="container">
           <div class="viewport">
             <img id="slide" src="one.svg" alt="One" class="slide" width="960" height="540">
           </div>

           <progress id="progress" class="progress" value="0" max="2"></progress>

           <div id="actions" class="actions">
             <a href="_three.html"
                class="action"
                data-direction="backward"
                hx-get="_three.html"
                hx-trigger="click, keyup[key=='ArrowLeft'] from:body"
                hx-push_url="true">Previous</a>

             <span class="status">1 of 3</span>

             <a href="_two.html"
                class="action"
                data-direction="forward"
                hx-get="_two.html"
                hx-trigger="click, keyup[key=='ArrowRight'] from:body"
                hx-push_url="true">Next</a>

             <a href="_one.html"
                class="action"
                data-direction="backward"
                hx-get="_one.html"
                hx-trigger="click, keyup[key=='['] from:body"
                hx-push_url="true">First</a>

             <button data-fullscreen-trigger>[ ]</button>

             <a href="_three.html"
                class="action"
                data-direction="forward"
                hx-get="_three.html"
                hx-trigger="click, keyup[key==']'] from:body"
                hx-push_url="true">Last</a>
         </div>
      </section>
    </main>
  </body>
</html>
